<!-- ============================================================
     FLIPPER — L'arrière-salle  ·  pinball 2D rétro pixel
     Un seul fichier. Vraie physique : gravité, rebonds, bumpers.
     Contrôles : flèches G/D (ou A / L), Espace pour lancer.
     Sur tél : touche moitié gauche/droite de l'écran, tape pour lancer.
     À régler en premier :  <<< CHANGE ICI
     ============================================================ -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flipper — L'arrière-salle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<style>
  :root{ --ink:#0E0A0B; --bone:#E8E2D6; --smoke:#8A8079; --neon:#2FD6C6; --oxblood:#E0392F; --sodium:#E9A23B; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; }
  body{
    background:var(--ink); color:var(--bone);
    font-family:'Space Mono',monospace;
    display:flex; flex-direction:column; align-items:center;
    touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  .hud{
    width:min(420px,94vw); display:flex; justify-content:space-between; align-items:flex-end;
    padding:.8rem 0 .5rem; font-family:'Press Start 2P',monospace;
  }
  .hud .ttl{ font-size:.9rem; color:var(--neon); text-shadow:2px 2px 0 rgba(47,214,198,.25); }
  .hud .sub{ font-family:'Space Mono',monospace; font-size:.56rem; letter-spacing:.18em;
    text-transform:uppercase; color:var(--smoke); margin-top:.4rem; }
  .hud .right{ text-align:right; font-size:.6rem; line-height:1.8; }
  .hud .right .sc{ color:var(--sodium); }
  .hud .right .bl{ color:var(--oxblood); letter-spacing:2px; }

  .stage{ position:relative; width:min(420px,94vw); }
  canvas{ display:block; width:100%; image-rendering:pixelated; border-radius:8px;
    border:2px solid rgba(232,226,214,.14); background:#0a0809; }
  /* scanlines CRT */
  .stage::after{
    content:""; position:absolute; inset:0; border-radius:8px; pointer-events:none;
    background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.28) 2px 3px);
    mix-blend-mode:multiply;
  }

  .overlay{ position:absolute; inset:0; display:grid; place-items:center; text-align:center;
    background:rgba(14,10,11,.84); border-radius:8px; padding:1.4rem; }
  .overlay.hidden{ display:none; }
  .overlay h2{ font-family:'Press Start 2P',monospace; font-size:1.3rem; line-height:1.3;
    color:var(--neon); text-shadow:2px 2px 0 rgba(47,214,198,.3); margin-bottom:.9rem; }
  .overlay h2.dead{ color:var(--oxblood); text-shadow:2px 2px 0 rgba(224,57,47,.3); }
  .overlay p{ color:var(--smoke); font-size:.74rem; line-height:1.6; margin-bottom:1.2rem; max-width:30ch; }
  .overlay p b{ color:var(--bone); }
  button{ font-family:'Press Start 2P',monospace; font-size:.7rem; cursor:pointer;
    background:var(--neon); color:var(--ink); border:none; border-radius:6px; padding:.9rem 1.3rem; }
  button:active{ transform:translateY(1px); }
  .hint{ width:min(420px,94vw); text-align:center; color:var(--smoke);
    font-size:.58rem; letter-spacing:.06em; padding:.6rem 0 .2rem; line-height:1.7; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none!important; } }
</style>
</head>
<body>

  <div class="hud">
    <div>
      <div class="ttl">FLIPPER</div>
      <div class="sub">L'arrière-salle</div>
    </div>
    <div class="right">
      <div class="sc">SCORE <span id="score">0</span></div>
      <div>RECORD <span id="best">0</span></div>
      <div class="bl">BILLES <span id="balls">●●●</span></div>
    </div>
  </div>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="overlay" id="ov">
      <div>
        <h2 id="ovT">FLIPPER</h2>
        <p id="ovP">Flèches <b>gauche / droite</b> pour les gâchettes, <b>Espace</b> pour lancer la bille. Sur tél : touche la <b>moitié gauche/droite</b> de l'écran.</p>
        <button id="play">Insérer une pièce</button>
      </div>
    </div>
  </div>
  <div class="hint">flèches G / D · espace = lancer &nbsp;|&nbsp; tél : moitié G/D, tape pour lancer</div>

<script>
/* =================== RÉGLAGES ===================   <<< CHANGE ICI */
const GRAVITE   = 460;   // attraction vers le bas
const REBOND    = 0.52;  // élasticité des murs (0 = mou, 1 = très rebondissant)
const POMPE     = 150;   // pep des bumpers
const VITESSE_MAX= 720;  // plafond de vitesse de la bille
const BILLES     = 3;    // nombre de billes par partie

/* =================== MOTEUR (pas besoin de toucher) =================== */
const BW=180, BH=300;                 // résolution interne (gros pixels)
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const buf=document.createElement("canvas"); buf.width=BW; buf.height=BH;
const b=buf.getContext("2d");
const ov=document.getElementById("ov"), ovT=document.getElementById("ovT"), ovP=document.getElementById("ovP");
const scoreEl=document.getElementById("score"), bestEl=document.getElementById("best"), ballsEl=document.getElementById("balls");

let DISP=420;
function resize(){
  DISP=cv.clientWidth || (cv.parentElement && cv.parentElement.clientWidth) || Math.min(420, (window.innerWidth||420)*0.94) || 360;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=DISP*dpr; cv.height=Math.round(DISP*BH/BW)*dpr;
  cv.style.height=Math.round(DISP*BH/BW)+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false;
}
addEventListener("resize", resize);

/* ---- géométrie de la table : segments de murs [x1,y1,x2,y2] ---- */
const WALLS=[
  [8,18, 8,250],      // mur gauche
  [8,18, 172,18],     // haut
  [172,18, 172,250],  // mur droit
  [8,250, 52,278],    // entonnoir gauche -> flipper G
  [172,250, 116,278], // entonnoir droit -> flipper D
  [8,60, 26,30],      // biseau coin haut-gauche
  [172,60, 154,30]    // biseau coin haut-droit
];
/* bumpers ronds : [x,y,rayon,points] */
const BUMPERS=[ [58,92,11,100], [102,74,11,100], [128,116,10,100] ];
let bumperFlash=[0,0,0];

/* ---- flippers ---- */
const FL={ px:52, py:278, len:30, rest:0.66, act:-0.42, a:0.66, omega:0, on:false }; // gauche
const FR={ px:116,py:278, len:30, rest:Math.PI-0.66, act:Math.PI+0.42, a:Math.PI-0.66, omega:0, on:false }; // droit
const FLIP_SPEED=22; // rad/s

/* ---- bille ---- */
const ball={ x:90, y:30, vx:0, vy:0, r:5, state:"lane" };
let score=0, best=0, ballsLeft=BILLES, running=false;

function clamp(v,a,c){ return v<a?a:(v>c?c:v); }

function newBall(){
  ball.x=90; ball.y=30; ball.vx=0; ball.vy=0; ball.state="lane";
  ovHide();
}
function launch(){
  if(ball.state!=="lane") return;
  ball.state="play"; ball.vy=70; ball.vx=(Math.random()-0.5)*120;
}
function startGame(){
  score=0; ballsLeft=BILLES; updateHUD(); running=true; newBall();
  last=performance.now(); requestAnimationFrame(loop);
}
function loseBall(){
  ballsLeft--; updateHUD();
  if(ballsLeft<=0){ running=false; gameOver(); }
  else newBall();
}
function gameOver(){
  best=Math.max(best,score); bestEl.textContent=best;
  ovT.textContent="GAME OVER"; ovT.className="dead";
  ovP.innerHTML=`Score : <b>${score}</b>. ${score>=best&&score>0?"Nouveau record.":"Record : "+best+"."}`;
  document.getElementById("play").textContent="Recommencer";
  ovShow();
}
function updateHUD(){
  scoreEl.textContent=score;
  ballsEl.textContent="●".repeat(Math.max(0,ballsLeft));
}
function ovShow(){ ov.classList.remove("hidden"); }
function ovHide(){ ov.classList.add("hidden"); }

/* ---- collisions ---- */
function collideSeg(ax,ay,cx2,cy2,rest,flip){
  const abx=cx2-ax, aby=cy2-ay; const len2=abx*abx+aby*aby||1;
  const t=clamp(((ball.x-ax)*abx+(ball.y-ay)*aby)/len2,0,1);
  const px=ax+abx*t, py=ay+aby*t;
  let dx=ball.x-px, dy=ball.y-py, d=Math.hypot(dx,dy);
  if(d<ball.r){
    if(d<0.001){ d=0.001; dx=0; dy=-1; }
    const nx=dx/d, ny=dy/d;
    ball.x=px+nx*ball.r; ball.y=py+ny*ball.r;
    let rvx=ball.vx, rvy=ball.vy;
    if(flip){ const rx=px-flip.px, ry=py-flip.py; rvx-=-flip.omega*ry; rvy-=flip.omega*rx; }
    const vn=rvx*nx+rvy*ny;
    if(vn<0){
      const j=-(1+rest)*vn; ball.vx+=j*nx; ball.vy+=j*ny;
      if(flip){ const rx=px-flip.px, ry=py-flip.py; ball.vx+=(-flip.omega*ry)*0.6; ball.vy+=(flip.omega*rx)*0.6; }
    }
  }
}
function collideBumper(i){
  const [cx,cy,cr,pts]=BUMPERS[i];
  let dx=ball.x-cx, dy=ball.y-cy, d=Math.hypot(dx,dy);
  if(d<ball.r+cr){
    if(d<0.001) d=0.001;
    const nx=dx/d, ny=dy/d;
    ball.x=cx+nx*(ball.r+cr); ball.y=cy+ny*(ball.r+cr);
    const vn=ball.vx*nx+ball.vy*ny;
    if(vn<0){ const j=-(1+0.7)*vn; ball.vx+=j*nx; ball.vy+=j*ny; }
    ball.vx+=nx*POMPE; ball.vy+=ny*POMPE;
    score+=pts; updateHUD(); bumperFlash[i]=1;
  }
}

function flipperSeg(f){ return [f.px,f.py, f.px+Math.cos(f.a)*f.len, f.py+Math.sin(f.a)*f.len]; }

/* ---- boucle ---- */
let last=0;
function loop(now){
  if(!running) return;
  let dt=(now-last)/1000; last=now; if(dt>0.033) dt=0.033;

  // gâchettes : on bouge l'angle vers la cible, on note la vitesse angulaire
  for(const [f,sign] of [[FL,1],[FR,-1]]){
    const target=f.on?f.act:f.rest;
    const old=f.a;
    const max=FLIP_SPEED*dt;
    f.a += clamp(target-f.a,-max,max);
    f.omega=(f.a-old)/dt;
  }
  for(let i=0;i<3;i++) bumperFlash[i]*=0.85;

  if(ball.state==="lane"){
    ball.x=90; ball.y=30; // bille en attente, en haut
  } else {
    // sous-étapes pour éviter que la bille traverse un mur
    const speed=Math.hypot(ball.vx,ball.vy);
    const steps=clamp(Math.ceil(speed*dt/(ball.r*0.6)),1,8);
    const h=dt/steps;
    for(let s=0;s<steps;s++){
      ball.vy+=GRAVITE*h;
      const sp=Math.hypot(ball.vx,ball.vy);
      if(sp>VITESSE_MAX){ ball.vx*=VITESSE_MAX/sp; ball.vy*=VITESSE_MAX/sp; }
      ball.x+=ball.vx*h; ball.y+=ball.vy*h;
      for(const w of WALLS) collideSeg(w[0],w[1],w[2],w[3],REBOND,null);
      const lsg=flipperSeg(FL); collideSeg(lsg[0],lsg[1],lsg[2],lsg[3],0.35,FL);
      const rsg=flipperSeg(FR); collideSeg(rsg[0],rsg[1],rsg[2],rsg[3],0.35,FR);
      for(let i=0;i<3;i++) collideBumper(i);
      if(ball.y>BH-2){ loseBall(); break; } // drain
    }
  }
  draw();
  requestAnimationFrame(loop);
}

/* ---- rendu pixel ---- */
function px(x,y,w,hh,col){ b.fillStyle=col; b.fillRect(x|0,y|0,w,hh); }
function line(x1,y1,x2,y2,col,wd){
  b.strokeStyle=col; b.lineWidth=wd||3; b.lineCap="round";
  b.beginPath(); b.moveTo(x1,y1); b.lineTo(x2,y2); b.stroke();
}
function draw(){
  b.fillStyle="#0c0a0b"; b.fillRect(0,0,BW,BH);
  // table légère lueur
  b.fillStyle="rgba(233,162,59,.05)"; b.fillRect(0,0,BW,120);
  // murs
  for(const w of WALLS) line(w[0],w[1],w[2],w[3],"#5a554e",3);
  // bumpers
  for(let i=0;i<3;i++){
    const [cx,cy,cr]=BUMPERS[i];
    b.fillStyle=bumperFlash[i]>0.3?"#E9A23B":"#9c4a16";
    b.beginPath(); b.arc(cx,cy,cr,0,7); b.fill();
    b.fillStyle="#E9A23B"; b.beginPath(); b.arc(cx,cy,cr*0.45,0,7); b.fill();
  }
  // flippers
  for(const f of [FL,FR]){ const s=flipperSeg(f); line(s[0],s[1],s[2],s[3],"#2FD6C6",5);
    b.fillStyle="#2FD6C6"; b.beginPath(); b.arc(f.px,f.py,3,0,7); b.fill(); }
  // bille
  b.fillStyle="#E8E2D6"; b.beginPath(); b.arc(ball.x,ball.y,ball.r,0,7); b.fill();
  b.fillStyle="#2FD6C6"; b.beginPath(); b.arc(ball.x-1.4,ball.y-1.4,ball.r*0.4,0,7); b.fill();
  // invite de lancement
  if(ball.state==="lane"){
    b.fillStyle="#E9A23B"; b.font="8px monospace"; b.textAlign="center";
    b.fillText("ESPACE / TAP", 90, 150); b.fillText("POUR LACHER", 90, 162);
  }
  // blit agrandi en gros pixels
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,DISP,DISP*BH/BW);
  ctx.drawImage(buf,0,0,DISP,DISP*BH/BW);
}

/* ---- contrôles ---- */
addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="q") FL.on=true;
  if(e.key==="ArrowRight"||e.key==="l"||e.key==="d") FR.on=true;
  if(e.key===" "){ launch(); e.preventDefault(); }
});
addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="q") FL.on=false;
  if(e.key==="ArrowRight"||e.key==="l"||e.key==="d") FR.on=false;
});
function touchScan(e){
  FL.on=false; FR.on=false;
  const r=cv.getBoundingClientRect();
  for(const t of e.touches){
    const x=t.clientX-r.left;
    if(x<r.width/2) FL.on=true; else FR.on=true;
  }
  if(ball.state==="lane" && e.touches.length) launch();
}
cv.addEventListener("touchstart",e=>{ touchScan(e); e.preventDefault(); },{passive:false});
cv.addEventListener("touchend",e=>{ touchScan(e); e.preventDefault(); },{passive:false});

document.getElementById("play").addEventListener("click", startGame);
resize(); draw();
addEventListener("load",()=>{ resize(); draw(); });
</script>
</body>
</html>
