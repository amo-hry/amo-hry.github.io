<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
  }

  .bg iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
  }

  .content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    font-size: 32px;
    letter-spacing: 2px;
  }
</style>
</head>

<body>

<div class="bg">
  <iframe src="https://giphy.com/embed/eQuHt7jwfpcaOkRwY5" allowfullscreen></iframe>
</div>

<div class="overlay"></div>

<div class="content">
  Bienvenue.
</div>

<script>
let konami = [];
const konamiCode = [
  "ArrowUp","ArrowUp",
  "ArrowDown","ArrowDown",
  "ArrowLeft","ArrowRight",
  "ArrowLeft","ArrowRight",
  "b","a"
];

document.addEventListener("keydown", (e) => {
  konami.push(e.key);

  if (konami.length > konamiCode.length) {
    konami.shift();
  }

  if (JSON.stringify(konami) === JSON.stringify(konamiCode)) {
    window.location.href = "secret.html";
  }
});
</script>

</body>
</html>
