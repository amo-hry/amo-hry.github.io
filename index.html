<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ------------------------------ */
/* GLOBAL RESET + FULLSCREEN      */
/* ------------------------------ */

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
}

/* ------------------------------ */
/* FOND TECHNO LIGNES ANIMÉES     */
/* ------------------------------ */

body {
  background: #000;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: 
    repeating-linear-gradient(
      to bottom,
      rgba(0,255,200,0.08) 0px,
      rgba(0,255,200,0.08) 1px,
      transparent 3px
    );
  animation: moveLines 6s linear infinite;
  opacity: 0.25;
  pointer-events: none;
}

@keyframes moveLines {
  0% { transform: translateY(0); }
  100% { transform: translateY(10px); }
}

/* ------------------------------ */
/* LOGO EN HAUT À DROITE          */
/* ------------------------------ */

.logo-top {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  box-shadow: 0 0 14px rgba(0,255,200,0.45);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.logo-top:hover {
  transform: scale(1.12);
  box-shadow: 0 0 22px rgba(0,255,200,0.75);
}

.logo-top iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ------------------------------ */
/* CONTENU CENTRÉ                 */
/* ------------------------------ */

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

/* ------------------------------ */
/* TITRE AVEC TYPING              */
/* ------------------------------ */

.name {
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 2px;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 1.6s steps(20) forwards;
  margin-bottom: 20px;
}

@keyframes typing {
  from { width: 0; }
  to { width: 220px; }
}

/* ------------------------------ */
/* PHRASES ANIMÉES                */
/* ------------------------------ */

.bio {
  font-size: 22px;
  height: 30px;
  position: relative;
}

.bio span {
  opacity: 0;
  position: absolute;
  width: 100%;
  animation: fade 9s infinite;
}

.bio span:nth-child(1) { animation-delay: 0s; }
.bio span:nth-child(2) { animation-delay: 3s; }
.bio span:nth-child(3) { animation-delay: 6s; }

@keyframes fade {
  0% { opacity: 0; }
  10% { opacity: 1; }
  30% { opacity: 1; }
  40% { opacity: 0; }
  100% { opacity: 0; }
}

/* ------------------------------ */
/* MENU BAS                       */
/* ------------------------------ */

.bottom-menu {
  position: fixed;
  bottom: -80px;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  padding: 18px 0;
  text-align: center;
  transition: bottom 0.4s ease;
  display: flex;
  justify-content: center;
  gap: 28px;
  border-top: 1px solid rgba(0,255,200,0.25);
  box-shadow: 0 -4px 12px rgba(0,255,200,0.25);
}

.bottom-menu:hover {
  bottom: 0;
}

.bottom-menu a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 18px;
  transition: opacity 0.3s, text-shadow 0.3s;
}

.bottom-menu a:hover {
  opacity: 0.6;
  text-shadow: 0 0 18px rgba(0,255,200,0.8);
}

/* ------------------------------ */
/* RESPONSIVE                     */
/* ------------------------------ */

@media (max-width: 600px) {
  .name { font-size: 32px; width: 180px; }
  .bio { font-size: 18px; }
  .bottom-menu a { font-size: 16px; }
}

</style>
</head>

<body>

<!-- LOGO EN HAUT À DROITE -->
<div class="logo-top">
  <iframe src="https://giphy.com/embed/eQuHt7jwfpcaOkRwY5" allowfullscreen></iframe>
</div>

<!-- CONTENU CENTRAL -->
<div class="content">
  <div class="name">amo_hry</div>

  <div class="bio">
    <span>Beginner in cybersecurity</span>
    <span>Learning by breaking & fixing</span>
    <span>Building clean systems</span>
  </div>
</div>

<!-- MENU BAS -->
<div class="bottom-menu">
  <a href="https://www.instagram.com/amo_hry/" target="_blank">Instagram</a>
  <a href="https://github.com/amo-hry" target="_blank">GitHub</a>
  <a href="https://tryhackme.com/p/amo.hry" target="_blank">TryHackMe</a>
</div>

</body>
</html>
