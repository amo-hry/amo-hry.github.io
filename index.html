<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      /* Fond GIF */
      #bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -1;
        filter: brightness(1.2) saturate(1.3);
      }

      /* Glow */
      .glow {
        color: white;
        font-size: 60px;
        text-shadow: 0 0 20px #ff00ff;
        animation: pulse 3s infinite ease-in-out;
        position: absolute;
        top: 20px;
        left: 20px;
      }

      @keyframes pulse {
        0% { opacity: 0.8; }
        50% { opacity: 1; }
        100% { opacity: 0.8; }
      }

      /* Cube 3D */
      .cube {
        width: 100px;
        height: 100px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform-style: preserve-3d;
        animation: spin 6s infinite linear;
      }

      .cube div {
        position: absolute;
        width: 100px;
        height: 100px;
        background: rgba(255,255,255,0.2);
        border: 2px solid white;
      }

      @keyframes spin {
        from { transform: rotateX(0deg) rotateY(0deg); }
        to { transform: rotateX(360deg) rotateY(360deg); }
      }

      /* Timeline GIF */
      .timeline {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
      }
    </style>

    <script>
      window.onload = () => {
        alert("⚠️ Attention : effets lumineux et animations.");
      };
    </script>
  </head>

  <body>
    <!-- Fond GIF -->
    <img id="bg" src="TON_GIF_ICI.gif">

    <!-- Glow -->
    <div class="glow">AMAURY</div>

    <!-- Cube 3D -->
    <div class="cube">
      <div style="transform: translateZ(50px);"></div>
      <div style="transform: rotateY(90deg) translateZ(50px);"></div>
      <div style="transform: rotateY(180deg) translateZ(50px);"></div>
      <div style="transform: rotateY(-90deg) translateZ(50px);"></div>
      <div style="transform: rotateX(90deg) translateZ(50px);"></div>
      <div style="transform: rotateX(-90deg) translateZ(50px);"></div>
    </div>

    <!-- Timeline GIF -->
    <div class="timeline">
      <img src="gif1.gif" width="120">
      <img src="gif2.gif" width="120">
      <img src="gif3.gif" width="120">
    </div>
  </body>
</html>
