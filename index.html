<style>
  body {
    margin: 0;
    overflow: hidden;
  }

  /* IMAGE DE FOND */
  .bg {
    position: fixed;
    inset: 0;
    background-image: url('https://cdn.generationvoyage.fr/2024/06/Temple-Kinkaku-ji-a-Kyoto-Japon-reflete-dans-un-lac-entoure-de-verdure-1000x668.jpeg');
    background-size: cover;
    background-position: center;
    z-index: -5;
  }

  /* EAU QUI COULE (cascade + lac) */
  .water {
    position: fixed;
    inset: 0;
    background-image: url('https://i.imgur.com/8K3YQ0F.png');
    background-size: 35%;
    opacity: 0.22;
    mix-blend-mode: screen;
    animation: flow 6s linear infinite;
    z-index: -4;
  }

  @keyframes flow {
    from { background-position: 0 0; }
    to   { background-position: 0 600px; }
  }

  /* REFLET ANIMÉ SUR LE LAC */
  .reflection {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 80%, rgba(255,255,255,0.15), transparent 60%);
    mix-blend-mode: soft-light;
    opacity: 0.25;
    animation: shimmer 8s ease-in-out infinite;
    z-index: -3;
  }

  @keyframes shimmer {
    0%   { transform: translateY(0); opacity: 0.15; }
    50%  { transform: translateY(8px); opacity: 0.28; }
    100% { transform: translateY(0); opacity: 0.15; }
  }

  /* BRUME LÉGÈRE */
  .mist {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.18), transparent 70%);
    mix-blend-mode: screen;
    opacity: 0.35;
    animation: mistPulse 12s ease-in-out infinite;
    z-index: -2;
  }

  @keyframes mistPulse {
    0%   { opacity: 0.25; }
    50%  { opacity: 0.45; }
    100% { opacity: 0.25; }
  }

  /* POISSONS KOI ANIMÉS */
  .koi {
    position: fixed;
    width: 80px;
    height: 80px;
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0.9;
    z-index: -1;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
  }

  /* Koi 1 */
  .koi1 {
    background-image: url('https://i.imgur.com/4o5tZ8G.png');
    top: 65%;
    left: -10%;
    animation: swim1 22s linear infinite;
  }

  @keyframes swim1 {
    from { transform: translateX(0) translateY(0) rotate(0deg); }
    to   { transform: translateX(130vw) translateY(-10px) rotate(4deg); }
  }

  /* Koi 2 */
  .koi2 {
    background-image: url('https://i.imgur.com/4o5tZ8G.png');
    top: 72%;
    left: -15%;
    transform: scale(0.8);
    animation: swim2 28s linear infinite;
  }

  @keyframes swim2 {
    from { transform: translateX(0) translateY(0) rotate(-2deg) scale(0.8); }
    to   { transform: translateX(140vw) translateY(12px) rotate(2deg) scale(0.8); }
  }

  /* Koi 3 */
  .koi3 {
    background-image: url('https://i.imgur.com/4o5tZ8G.png');
    top: 68%;
    left: -20%;
    transform: scale(1.2);
    animation: swim3 32s linear infinite;
  }

  @keyframes swim3 {
    from { transform: translateX(0) translateY(0) rotate(1deg) scale(1.2); }
    to   { transform: translateX(150vw) translateY(-6px) rotate(-1deg) scale(1.2); }
  }
</style>

<div class="bg"></div>
<div class="water"></div>
<div class="reflection"></div>
<div class="mist"></div>

<div class="koi koi1"></div>
<div class="koi koi2"></div>
<div class="koi koi3"></div>
