<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #02040a;
        font-family: system-ui, sans-serif;
        color: white;
      }

      /* Conteneur du fond */
      .bg-scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: -1;
        perspective: 1200px;
      }

      /* Couche lointaine (montagnes / brume) */
      .layer-back {
        position: absolute;
        inset: -10%;
        background: radial-gradient(circle at top,
          #1b2a3f 0%,
          #050814 45%,
          #02040a 100%);
        transform: translateZ(-300px) scale(1.3);
        filter: blur(4px);
        animation: slow-drift 40s linear infinite;
      }

      /* Couche milieu (forêt / relief) */
      .layer-mid {
        position: absolute;
        inset: -5%;
        background:
          radial-gradient(circle at 20% 80%, rgba(40,120,120,0.4) 0, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(120,80,160,0.4) 0, transparent 45%),
          linear-gradient(to top, #050b14 0%, transparent 40%);
        transform: translateZ(-150px) scale(1.15);
        mix-blend-mode: screen;
        animation: mid-drift 30s linear infinite;
      }

      /* Couche avant (rivière / cascade stylisée) */
      .layer-front {
        position: absolute;
        left: -20%;
        right: -20%;
        bottom: -10%;
        height: 60%;
        background:
          linear-gradient(to top,
            rgba(10,180,200,0.9),
            rgba(120,220,255,0.7),
            rgba(255,255,255,0.2)),
          repeating-linear-gradient(
            -10deg,
            rgba(255,255,255,0.25) 0,
            rgba(255,255,255,0.25) 4px,
            transparent 4px,
            transparent 10px
          );
        border-radius: 50% 50% 0 0;
        filter: blur(1px);
        opacity: 0.9;
        transform: translateZ(0) translateY(10px);
        animation: river-flow 12s ease-in-out infinite;
      }

      /* Lueur globale */
      .glow-mist {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 20%, rgba(200,230,255,0.35) 0, transparent 55%),
          radial-gradient(circle at 10% 90%, rgba(120,200,200,0.25) 0, transparent 45%),
          radial-gradient(circle at 90% 80%, rgba(200,140,255,0.25) 0, transparent 45%);
        mix-blend-mode: screen;
        opacity: 0.9;
        animation: mist-pulse 18s ease-in-out infinite;
      }

      /* Contenu par-dessus */
      .content {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .title {
        font-size: 42px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-shadow:
          0 0 12px rgba(180,220,255,0.9),
          0 0 30px rgba(80,160,255,0.8);
        animation: title-glow 4s ease-in-out infinite;
      }

      @keyframes slow-drift {
        from { transform: translateZ(-300px) scale(1.3) translateX(0); }
        to   { transform: translateZ(-300px) scale(1.3) translateX(-80px); }
      }

      @keyframes mid-drift {
        from { transform: translateZ(-150px) scale(1.15) translateX(0); }
        to   { transform: translateZ(-150px) scale(1.15) translateX(60px); }
      }

      @keyframes river-flow {
        0%   { transform: translateZ(0) translateY(10px) translateX(0); }
        50%  { transform: translateZ(0) translateY(5px) translateX(40px); }
        100% { transform: translateZ(0) translateY(10px) translateX(0); }
      }

      @keyframes mist-pulse {
        0%   { opacity: 0.7; }
        50%  { opacity: 1; }
        100% { opacity: 0.7; }
      }

      @keyframes title-glow {
        0%   { text-shadow: 0 0 10px rgba(180,220,255,0.7); }
        50%  { text-shadow: 0 0 25px rgba(120,200,255,1); }
        100% { text-shadow: 0 0 10px rgba(180,220,255,0.7); }
      }
    </style>
  </head>

  <body>
    <div class="bg-scene">
      <div class="layer-back"></div>
      <div class="layer-mid"></div>
      <div class="layer-front"></div>
      <div class="glow-mist"></div>
    </div>

    <div class="content">
      <div class="title">
        AMAURY // RIVIÈRE MENTALE
      </div>
    </div>
  </body>
</html>
