<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>


/* ------------------------------ */
/* FOND TECH MULTI-LIGNES         */
/* ------------------------------ */
/* ------------------------------ */
/* FOND TECH MULTI-DIRECTIONS     */
/* ------------------------------ */

body {
  background: #000;
  position: relative;
  overflow: hidden;
}

/* Trois couches de lignes dans 3 directions */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    /* Cyan — 45° */
    repeating-linear-gradient(
      45deg,
      rgba(0,255,255,0.18) 0px,
      rgba(0,255,255,0.18) 2px,
      transparent 10px
    ),

    /* Rose — -45° */
    repeating-linear-gradient(
      -45deg,
      rgba(255,80,180,0.18) 0px,
      rgba(255,80,180,0.18) 2px,
      transparent 12px
    ),

    /* Vert — vertical */
    repeating-linear-gradient(
      90deg,
      rgba(0,255,120,0.15) 0px,
      rgba(0,255,120,0.15) 1px,
      transparent 8px
    );

  background-size: 220% 220%;
  animation: linesMove 22s linear infinite;
  opacity: 0.45;
  pointer-events: none;
}

/* Glow + scan léger */
body::after {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at 50% 50%, rgba(0,255,255,0.12), transparent 70%),
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 1px,
      transparent 4px
    );

  animation: scanSoft 10s linear infinite;
  opacity: 0.20;
  pointer-events: none;
}

/* Animation diagonale douce */
@keyframes linesMove {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

/* Scan vertical très léger */
@keyframes scanSoft {
  0% { transform: translateY(0); }
  100% { transform: translateY(10px); }
}




/* ------------------------------ */
/* LOGO EN HAUT À DROITE          */
/* ------------------------------ */

.logo-top {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  box-shadow: 0 0 18px rgba(0,255,200,0.55);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.logo-top:hover {
  transform: scale(1.15);
  box-shadow: 0 0 28px rgba(0,255,200,0.85);
}

.logo-top iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ------------------------------ */
/* CONTENU CENTRAL                */
/* ------------------------------ */

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

/* ------------------------------ */
/* amo_hry → fade-in centre → slide */
/* ------------------------------ */

.name {
  font-size: 48px;
  font-weight: 600;
  letter-spacing: 2px;
  opacity: 0;
  animation:
    fadeIn 1.2s ease forwards,
    moveToCorner 1.2s ease forwards 1.2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes moveToCorner {
  from {
    transform: translate(-50%, -50%);
  }
  to {
    transform: translate(-350px, -250px);
  }
}

/* ------------------------------ */
/* PHRASES ANIMÉES                */
/* ------------------------------ */

.bio {
  font-size: 22px;
  height: 30px;
  position: relative;
  margin-top: 40px;
}

.bio span {
  opacity: 0;
  position: absolute;
  width: 100%;
  animation: fade 9s infinite;
}

.bio span:nth-child(1) { animation-delay: 0s; }
.bio span:nth-child(2) { animation-delay: 3s; }
.bio span:nth-child(3) { animation-delay: 6s; }

@keyframes fade {
  0% { opacity: 0; }
  10% { opacity: 1; }
  30% { opacity: 1; }
  40% { opacity: 0; }
  100% { opacity: 0; }
}

/* ------------------------------ */
/* MENU BAS                       */
/* ------------------------------ */

.bottom-menu {
  position: fixed;
  bottom: -80px;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  padding: 18px 0;
  text-align: center;
  transition: bottom 0.4s ease;
  display: flex;
  justify-content: center;
  gap: 28px;
  border-top: 1px solid rgba(0,255,200,0.25);
  box-shadow: 0 -4px 12px rgba(0,255,200,0.25);
}

.bottom-menu:hover {
  bottom: 0;
}

.bottom-menu a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 18px;
  transition: opacity 0.3s, text-shadow 0.3s;
}

.bottom-menu a:hover {
  opacity: 0.6;
  text-shadow: 0 0 18px rgba(0,255,200,0.8);
}

/* ------------------------------ */
/* RESPONSIVE                     */
/* ------------------------------ */

@media (max-width: 600px) {
  .name { font-size: 32px; }
  .bio { font-size: 18px; }
  .bottom-menu a { font-size: 16px; }
}

</style>
</head>

<body>

<!-- LOGO EN HAUT À DROITE -->
<div class="logo-top">
  <iframe src="https://giphy.com/embed/eQuHt7jwfpcaOkRwY5" allowfullscreen></iframe>
</div>

<!-- CONTENU CENTRAL -->
<div class="content">
  <div class="name">amo_hry</div>

  <div class="bio">
    <span>Beginner in cybersecurity</span>
    <span>Learning by breaking & fixing</span>
    <span>Building clean systems</span>
  </div>
</div>

<!-- MENU BAS -->
<div class="bottom-menu">
  <a href="https://www.instagram.com/amo_hry/" target="_blank">Instagram</a>
  <a href="https://github.com/amo-hry" target="_blank">GitHub</a>
  <a href="https://tryhackme.com/p/amo.hry" target="_blank">TryHackMe</a>
</div>

</body>
</html>
