<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
    animation: fadeIn 1.8s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* GIF plein écran */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
  }

  .bg iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }

  /* Overlay ultra-dark */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
  }

  /* Contenu centré */
  .content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    text-shadow: 0 0 12px rgba(0,255,200,0.25);
  }

  /* Typing effect */
  .name {
    font-size: 42px;
    letter-spacing: 2px;
    font-weight: 600;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid #00ffcc;
    width: 0;
    animation: typing 3s steps(20) forwards, blink 0.7s infinite;
  }

  @keyframes typing {
    from { width: 0; }
    to { width: 220px; }
  }

  @keyframes blink {
    50% { border-color: transparent; }
  }

  .role {
    font-size: 20px;
    opacity: 0.85;
    margin-bottom: 30px;
    text-shadow: 0 0 10px rgba(0,255,200,0.25);
  }

  /* Phrases animées */
  .bio {
    font-size: 20px;
    height: 30px;
    position: relative;
  }

  .bio span {
    opacity: 0;
    position: absolute;
    width: 100%;
    animation: fade 9s infinite;
  }

  .bio span:nth-child(1) { animation-delay: 0s; }
  .bio span:nth-child(2) { animation-delay: 3s; }
  .bio span:nth-child(3) { animation-delay: 6s; }

  @keyframes fade {
    0% { opacity: 0; }
    10% { opacity: 1; }
    30% { opacity: 1; }
    40% { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Menu bas */
  .bottom-menu {
    position: fixed;
    bottom: -80px;
    left: 0;
    width: 100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    padding: 18px 0;
    text-align: center;
    transition: bottom 0.4s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 28px;
    border-top: 1px solid rgba(0,255,200,0.15);
  }

  .bottom-menu:hover {
    bottom: 0;
  }

  .bottom-menu a {
    color: #00ffcc;
    text-decoration: none;
    font-size: 18px;
    transition: opacity 0.3s;
    text-shadow: 0 0 10px rgba(0,255,200,0.25);
  }

  .bottom-menu a:hover {
    opacity: 0.6;
  }

  /* Logo animé circulaire */
  .logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(0,255,200,0.35);
  }

  .logo iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>

<body>

<!-- GIF plein écran -->
<div class="bg">
  <iframe src="https://giphy.com/embed/UsFGgc45gJE3hGrSgw" allowfullscreen></iframe>
</div>

<div class="overlay"></div>

<div class="content">
  <div class="name">Amaury</div>
  <div class="role">Cybersecurity • Bioinformatics • Builder</div>

  <div class="bio">
    <span>Cybersecurity enthusiast.</span>
    <span>Bioinformatics in progress.</span>
    <span>Building clean systems.</span>
  </div>
</div>

<!-- Menu bas -->
<div class="bottom-menu">

  <!-- Logo animé circulaire -->
  <div class="logo">
    <iframe src="https://giphy.com/embed/eQuHt7jwfpcaOkRwY5" allowfullscreen></iframe>
  </div>

  <a href="https://www.instagram.com/amo_hry/" target="_blank">Instagram</a>
  <a href="https://github.com/amo-hry" target="_blank">GitHub</a>
  <a href="https://tryhackme.com/p/amo.hry" target="_blank">TryHackMe</a>
</div>

<!-- Konami Code -->
<script>
let konami = [];
const konamiCode = [
  "ArrowUp","ArrowUp",
  "ArrowDown","ArrowDown",
  "ArrowLeft","ArrowRight",
  "ArrowLeft","ArrowRight",
  "b","a"
];

document.addEventListener("keydown", (e) => {
  konami.push(e.key);

  if (konami.length > konamiCode.length) {
    konami.shift();
  }

  if (JSON.stringify(konami) === JSON.stringify(konamiCode)) {
    window.location.href = "secret.html";
  }
});
</script>

</body>
</html>
